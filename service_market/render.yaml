databases:
  - name: sm-db
    plan: free

services:
  - type: web
    name: service-market-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne service_market.asgi:application --bind 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_EXTRA_ORIGINS
        value: "capacitor://localhost,http://localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: sm-db
          property: connectionString
