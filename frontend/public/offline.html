<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Service Market - Hors connexion</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#f0f8ff;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px}
  .card{background:#fff;border-radius:24px;padding:48px 32px;text-align:center;max-width:420px;width:100%;box-shadow:0 8px 30px rgba(2,132,199,.12);border:1.5px solid #bae6fd}
  .icon{font-size:4rem;margin-bottom:16px}
  h1{color:#0c2340;font-weight:800;font-size:1.5rem;margin-bottom:8px}
  p{color:#64748b;line-height:1.6;margin-bottom:24px}
  .btn{background:#0284c7;color:#fff;border:none;border-radius:12px;padding:12px 28px;font-weight:700;cursor:pointer;font-size:.95rem}
  .btn:hover{background:#0369a1}
  .tip{background:#e0f2fe;color:#0369a1;border-radius:12px;padding:12px 16px;font-size:.82rem;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📶</div>
  <h1>Connexion indisponible</h1>
  <p>Vous consultez Service Market en mode hors-ligne. Certains contenus récemment chargés restent accessibles.</p>
  <button class="btn" onclick="location.reload()">🔄 Réessayer</button>
  <div class="tip">
    <strong>💡 Astuce :</strong> Les services et prestataires consultés récemment sont disponibles même sans connexion.
  </div>
</div>
</body>
</html>
