[phases.setup]
nixPkgs = ["python312", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
  "npm install",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "npm run build",
  "python manage.py collectstatic --noinput"
]

[start]
cmd = "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT service_market.asgi:application"
