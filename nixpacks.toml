[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "cd /app && npm install",
  "cd /app && pip3.11 install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd /app && CI=false npm run build",
  "cd /app && python3.11 manage.py collectstatic --noinput"
]

[start]
cmd = "cd /app && python3.11 manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT service_market.asgi:application"

[variables]
PYTHONUNBUFFERED = "1"
NODE_ENV = "production"